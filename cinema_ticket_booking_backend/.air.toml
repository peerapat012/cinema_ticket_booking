root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main.exe ./cmd/server"
bin = ".\\tmp\\main.exe"
full_bin = ".\\tmp\\main.exe"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["tmp", "vendor", "frontend", "node_modules", ".git"]
exclude_file = []
exclude_regex = ["_test\\.go"]
exclude_unchanged = false
follow_symlink = true
log = "air_build_errors.log"
delay = 500
stop_on_root = false
send_interrupt = true
kill_delay = 500

[color]
main = "yellow"
watcher = "cyan"
build = "green"
runner = "magenta"

[log]
time = true

[misc]
clean_on_exit = true